<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Morton Timmer - Pro Timer Suite</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Morton Timmer">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root {
    --primary-color: #38bdf8;
    --secondary-color: #f8fafc;
    --accent-color: #f43f5e;
    --background-color: #0f172a;
    --card-background: #0f172a;
    --text-color: #f8fafc;
    --text-muted: #94a3b8;
    --success-color: #10b981;
    --neutral-color: #1e293b;
    --border-color: #1e293b;
    --focus-ring: 0 0 0 3px rgba(56, 189, 248, 0.5);
}

button, select {
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: var(--background-color);
    color: var(--text-color);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    transition: all 0.3s ease;
    overflow-x: hidden;
}

*:focus-visible {
    outline: none;
    box-shadow: var(--focus-ring);
}

.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
}

.container {
    background-color: var(--card-background);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    width: 100%;
    min-height: 100vh;
    box-sizing: border-box;
    text-align: center;
    touch-action: manipulation;
}

h1 {
    color: var(--text-color);
    margin: 2rem 0;
    font-size: clamp(1rem, 2vw, 1.5rem);
    font-weight: 900;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    opacity: 0.5;
}

.tabs {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    background-color: var(--background-color);
    padding: 0;
    border-radius: 0;
    margin-bottom: 2rem;
    border: 2px solid var(--border-color);
    width: 100%;
}

.tab-btn {
    background: transparent;
    border: none;
    padding: 15px 25px;
    font-size: clamp(0.8rem, 2vw, 1.1rem);
    font-weight: 700;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.1s;
    border-radius: 0;
    flex: 1;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

.tab-btn.active {
    background-color: var(--primary-color);
    color: var(--background-color);
}

.tab-btn:hover:not(.active) {
    color: var(--text-color);
    background-color: rgba(255,255,255,0.1);
}

.section {
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    align-items: center;
    gap: 1.5rem;
    width: 100%;
    flex-grow: 1;
    animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.section.hidden {
    display: none;
}

.timer-display {
    font-size: clamp(5rem, 20vw, 35rem);
    font-weight: 900;
    color: var(--primary-color);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    font-family: 'JetBrains Mono', monospace;
    line-height: 0.8;
    margin: auto 0;
    padding: 1.5rem 0;
}

#countdown-display {
    font-size: clamp(4rem, 16vw, 30rem);
}

#stopwatch-display {
    font-size: clamp(3rem, 12vw, 22rem);
}

.next-interval {
    font-size: 1.8rem;
    color: var(--text-muted);
    font-weight: 500;
    transition: all 0.3s;
}

.finished {
    color: var(--success-color) !important;
    font-weight: 800;
    animation: pulse 1s infinite cubic-bezier(0.4, 0, 0.6, 1);
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.8; }
}

.settings {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 2rem;
    text-align: left;
    background: #111b2d;
    padding: 3rem;
    border-top: 2px solid var(--border-color);
    border-bottom: 2px solid var(--border-color);
    width: 100%;
    box-sizing: border-box;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.time-inputs, .interval-inputs {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
}

.input-group label {
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--primary-color);
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

.input-group input:focus {
    outline: none;
    border-color: var(--primary-color);
}

.input-group input:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    border-color: transparent;
}

/* Stepper styles */
.stepper {
    display: flex;
    align-items: stretch;
    background-color: var(--background-color);
    border: 2px solid var(--border-color);
    border-radius: 4px;
    overflow: hidden;
    transition: all 0.2s;
}

.stepper:focus-within {
    border-color: var(--primary-color);
}

.stepper input {
    border: none !important;
    border-radius: 0 !important;
    width: 65px !important;
    background: transparent !important;
    padding: 10px 5px !important;
    text-align: center;
    font-size: 1.1rem;
    color: white;
    font-weight: 600;
}

/* Hide arrows from number input */
.stepper input::-webkit-outer-spin-button,
.stepper input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
.stepper input[type=number] {
    -moz-appearance: textfield;
}

.stepper-btn {
    background: rgba(255,255,255,0.05);
    border: none;
    color: var(--primary-color);
    font-size: 1.5rem;
    font-weight: 700;
    padding: 0 14px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.stepper-btn:hover {
    background: rgba(255,255,255,0.15);
    color: white;
}

.stepper-btn:active {
    background: var(--primary-color);
    color: var(--background-color);
}



.status-label {
    font-size: 2rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-bottom: -1rem;
}

.status-work { color: var(--success-color); }
.status-break { color: var(--accent-color); }

.rounds-display {
    font-size: 1.5rem;
    color: var(--text-muted);
    margin-top: -1.5rem;
}

.controls {
    display: flex;
    justify-content: center;
    width: 100%;
    max-width: none;
    flex-wrap: wrap;
}

.btn {
    padding: 2rem;
    border: none;
    border-radius: 0;
    cursor: pointer;
    font-size: clamp(1rem, 2vw, 1.5rem);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    transition: all 0.1s;
    flex: 1;
    min-width: 200px;
}

.btn:hover:not(:disabled) {
    filter: brightness(1.2);
}

.btn:active:not(:disabled) {
    filter: brightness(0.8);
}

.btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    filter: grayscale(1);
    box-shadow: none;
    transform: none !important;
}

.start {
    background-color: var(--success-color);
    color: #fff;
}

.stop {
    background-color: var(--accent-color);
    color: #fff;
}

.reset {
    background-color: var(--neutral-color);
    color: #fff;
}

/* Settings Page Styles */
.settings-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
    padding: 2rem;
    width: 100%;
    box-sizing: border-box;
    text-align: left;
}

.settings-card {
    background: #111b2d;
    padding: 2rem;
    border: 2px solid var(--border-color);
    border-radius: 4px;
}

.settings-card h2 {
    color: var(--primary-color);
    font-size: 1.2rem;
    margin-top: 0;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.settings-option {
    margin-bottom: 1.5rem;
}

.settings-option label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: var(--text-muted);
}

.range-input {
    width: 100%;
    height: 6px;
    background: var(--background-color);
    border-radius: 3px;
    outline: none;
    -webkit-appearance: none;
}

.range-input::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: var(--primary-color);
    border-radius: 50%;
    cursor: pointer;
}

select.modern-select {
    width: 100%;
    padding: 10px;
    background: var(--background-color);
    border: 2px solid var(--border-color);
    color: white;
    font-size: 1rem;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
}

select.modern-select:focus {
    border-color: var(--primary-color);
}

.danger-btn {
    background-color: var(--accent-color);
    color: white;
    border: none;
    padding: 1rem 1.5rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    width: 100%;
    border-radius: 4px;
    transition: filter 0.2s;
}

.danger-btn:hover {
    filter: brightness(1.2);
}

/* Icons */
.btn i {
    margin-right: 0.5rem;
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .container {
        padding: 0.5rem;
    }

    .timer-display {
        font-size: clamp(3rem, 18vw, 15rem);
        margin: 0.5rem 0;
    }

    #countdown-display {
        font-size: clamp(2.5rem, 14vw, 12rem);
    }

    #stopwatch-display {
        font-size: clamp(2rem, 10vw, 10rem);
    }
    
    .btn {
        padding: 1.5rem 0.5rem;
        flex: 1 1 auto;
        min-width: 120px;
        font-size: 1rem;
    }

    .settings {
        gap: 1rem;
        padding: 1.5rem 1rem;
        width: 100%;
        border-left: none;
        border-right: none;
    }

    .settings-container {
        padding: 1rem;
        grid-template-columns: 1fr;
        gap: 1rem;
    }

    .settings-card {
        padding: 1.5rem 1rem;
    }
}

@media (max-width: 480px) {
    .tab-btn {
        padding: 8px 12px;
    }

    .stepper-btn {
        padding: 0 10px;
    }

    .stepper input {
        width: 45px !important;
        font-size: 1rem;
    }
    
    .time-inputs, .interval-inputs {
        gap: 4px;
    }
    
    .controls {
        gap: 0.5rem;
    }
    
    .btn {
        width: auto;
        min-width: 80px;
        flex: 1 1 30%;
        padding: 1.2rem 0.5rem;
        font-size: 0.9rem;
        letter-spacing: 0.1em;
    }
    
    .btn i {
        display: block;
        margin-right: 0;
        margin-bottom: 0.2rem;
    }
}

@media (max-width: 360px) {
    .stepper-btn {
        padding: 0 6px;
    }

    .stepper input {
        width: 38px !important;
    }

    .time-inputs, .interval-inputs {
        gap: 2px;
    }
}
    </style>
</head>
<body>
    <main class="container">
        <div id="aria-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
        <header>
            <h1>Morton Timmer</h1>
        </header>
        
        <nav class="tabs" role="tablist" aria-label="Timer Mode Selection">
            <button id="tab-stopwatch" class="tab-btn active" role="tab" aria-selected="true" aria-controls="stopwatch-section" onclick="showTab('stopwatch')">Stopwatch</button>
            <button id="tab-countdown" class="tab-btn" role="tab" aria-selected="false" aria-controls="countdown-section" onclick="showTab('countdown')">Countdown</button>
            <button id="tab-workout" class="tab-btn" role="tab" aria-selected="false" aria-controls="workout-section" onclick="showTab('workout')">Workout</button>
            <button id="tab-interval" class="tab-btn" role="tab" aria-selected="false" aria-controls="interval-section" onclick="showTab('interval')">Beep Timer</button>
            <button id="tab-settings" class="tab-btn" role="tab" aria-selected="false" aria-controls="settings-section" onclick="showTab('settings')"><i class="fas fa-cog" aria-hidden="true"></i> Settings</button>
        </nav>

        <div id="stopwatch-section" class="section" role="tabpanel" aria-labelledby="tab-stopwatch" tabindex="0">
            <div class="timer-display" id="stopwatch-display" role="timer" aria-live="polite">00:00:00.00</div>
            <div class="controls">
                <button id="stopwatch-start" class="btn start" aria-label="Start Stopwatch"><i class="fas fa-play" aria-hidden="true"></i>Start</button>
                <button id="stopwatch-stop" class="btn stop" disabled aria-label="Stop Stopwatch"><i class="fas fa-pause" aria-hidden="true"></i>Stop</button>
                <button id="stopwatch-reset" class="btn reset" aria-label="Reset Stopwatch"><i class="fas fa-redo" aria-hidden="true"></i>Reset</button>
            </div>
        </div>

        <div id="countdown-section" class="section hidden" role="tabpanel" aria-labelledby="tab-countdown" tabindex="0">
            <div class="settings">
                <div class="input-group">
                    <label>Set Time (HH:MM:SS)</label>
                    <div class="time-inputs">
                        <div class="stepper">
                            <button class="stepper-btn" onclick="changeValue('cd-hours', -1)" aria-label="Decrease Hours"><i class="fas fa-minus" aria-hidden="true"></i></button>
                            <input type="number" id="cd-hours" value="0" min="0" max="99" placeholder="HH" aria-label="Hours">
                            <button class="stepper-btn" onclick="changeValue('cd-hours', 1)" aria-label="Increase Hours"><i class="fas fa-plus" aria-hidden="true"></i></button>
                        </div>
                        <span aria-hidden="true">:</span>
                        <div class="stepper">
                            <button class="stepper-btn" onclick="changeValue('cd-minutes', -1)" aria-label="Decrease Minutes"><i class="fas fa-minus" aria-hidden="true"></i></button>
                            <input type="number" id="cd-minutes" value="5" min="0" max="59" placeholder="MM" aria-label="Minutes">
                            <button class="stepper-btn" onclick="changeValue('cd-minutes', 1)" aria-label="Increase Minutes"><i class="fas fa-plus" aria-hidden="true"></i></button>
                        </div>
                        <span aria-hidden="true">:</span>
                        <div class="stepper">
                            <button class="stepper-btn" onclick="changeValue('cd-seconds', -1)" aria-label="Decrease Seconds"><i class="fas fa-minus" aria-hidden="true"></i></button>
                            <input type="number" id="cd-seconds" value="0" min="0" max="59" placeholder="SS" aria-label="Seconds">
                            <button class="stepper-btn" onclick="changeValue('cd-seconds', 1)" aria-label="Increase Seconds"><i class="fas fa-plus" aria-hidden="true"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="timer-display" id="countdown-display" role="timer" aria-live="polite">00:05:00</div>
            <div class="controls">
                <button id="countdown-start" class="btn start" aria-label="Start Countdown"><i class="fas fa-play" aria-hidden="true"></i>Start</button>
                <button id="countdown-stop" class="btn stop" disabled aria-label="Stop Countdown"><i class="fas fa-pause" aria-hidden="true"></i>Stop</button>
                <button id="countdown-reset" class="btn reset" aria-label="Reset Countdown"><i class="fas fa-redo" aria-hidden="true"></i>Reset</button>
            </div>
        </div>

        <div id="workout-section" class="section hidden" role="tabpanel" aria-labelledby="tab-workout" tabindex="0">
            <div class="settings">
                <div class="input-group">
                    <label for="wk-rounds">Rounds</label>
                    <div class="stepper">
                        <button class="stepper-btn" onclick="changeValue('wk-rounds', -1)" aria-label="Decrease Rounds"><i class="fas fa-minus" aria-hidden="true"></i></button>
                        <input type="number" id="wk-rounds" value="8" min="1" style="width: 60px;">
                        <button class="stepper-btn" onclick="changeValue('wk-rounds', 1)" aria-label="Increase Rounds"><i class="fas fa-plus" aria-hidden="true"></i></button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Work (M:S)</label>
                    <div class="time-inputs">
                        <div class="stepper">
                            <button class="stepper-btn" onclick="changeValue('wk-work-min', -1)" aria-label="Decrease Work Minutes"><i class="fas fa-minus" aria-hidden="true"></i></button>
                            <input type="number" id="wk-work-min" value="0" min="0" placeholder="M" aria-label="Work Minutes">
                            <button class="stepper-btn" onclick="changeValue('wk-work-min', 1)" aria-label="Increase Work Minutes"><i class="fas fa-plus" aria-hidden="true"></i></button>
                        </div>
                        <span aria-hidden="true">:</span>
                        <div class="stepper">
                            <button class="stepper-btn" onclick="changeValue('wk-work-sec', -1)" aria-label="Decrease Work Seconds"><i class="fas fa-minus" aria-hidden="true"></i></button>
                            <input type="number" id="wk-work-sec" value="20" min="0" max="59" placeholder="S" aria-label="Work Seconds">
                            <button class="stepper-btn" onclick="changeValue('wk-work-sec', 1)" aria-label="Increase Work Seconds"><i class="fas fa-plus" aria-hidden="true"></i></button>
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label>Break (M:S)</label>
                    <div class="time-inputs">
                        <div class="stepper">
                            <button class="stepper-btn" onclick="changeValue('wk-break-min', -1)" aria-label="Decrease Break Minutes"><i class="fas fa-minus" aria-hidden="true"></i></button>
                            <input type="number" id="wk-break-min" value="0" min="0" placeholder="M" aria-label="Break Minutes">
                            <button class="stepper-btn" onclick="changeValue('wk-break-min', 1)" aria-label="Increase Break Minutes"><i class="fas fa-plus" aria-hidden="true"></i></button>
                        </div>
                        <span aria-hidden="true">:</span>
                        <div class="stepper">
                            <button class="stepper-btn" onclick="changeValue('wk-break-sec', -1)" aria-label="Decrease Break Seconds"><i class="fas fa-minus" aria-hidden="true"></i></button>
                            <input type="number" id="wk-break-sec" value="10" min="0" max="59" placeholder="S" aria-label="Break Seconds">
                            <button class="stepper-btn" onclick="changeValue('wk-break-sec', 1)" aria-label="Increase Break Seconds"><i class="fas fa-plus" aria-hidden="true"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="wk-status" class="status-label" aria-live="polite">Ready</div>
            <div class="timer-display" id="workout-display" role="timer" aria-live="polite">00:20</div>
            <div id="wk-rounds-display" class="rounds-display" aria-live="polite">Round 1 of 8</div>
            <div class="controls">
                <button id="workout-start" class="btn start" aria-label="Start Workout"><i class="fas fa-play" aria-hidden="true"></i>Start</button>
                <button id="workout-stop" class="btn stop" disabled aria-label="Stop Workout"><i class="fas fa-pause" aria-hidden="true"></i>Stop</button>
                <button id="workout-reset" class="btn reset" aria-label="Reset Workout"><i class="fas fa-redo" aria-hidden="true"></i>Reset</button>
            </div>
        </div>

        <div id="interval-section" class="section hidden" role="tabpanel" aria-labelledby="tab-interval" tabindex="0">
            <div class="settings">
                <div class="input-group">
                    <label for="total-time">Total Time (min)</label>
                    <div class="stepper">
                        <button class="stepper-btn" onclick="changeValue('total-time', -1)" aria-label="Decrease Total Time"><i class="fas fa-minus" aria-hidden="true"></i></button>
                        <input type="number" id="total-time" value="10" min="1">
                        <button class="stepper-btn" onclick="changeValue('total-time', 1)" aria-label="Increase Total Time"><i class="fas fa-plus" aria-hidden="true"></i></button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Beep Every (M:S)</label>
                    <div class="interval-inputs">
                        <div class="stepper">
                            <button class="stepper-btn" onclick="changeValue('interval-min', -1)" aria-label="Decrease Interval Minutes"><i class="fas fa-minus" aria-hidden="true"></i></button>
                            <input type="number" id="interval-min" value="1" min="0" placeholder="M" aria-label="Interval Minutes">
                            <button class="stepper-btn" onclick="changeValue('interval-min', 1)" aria-label="Increase Interval Minutes"><i class="fas fa-plus" aria-hidden="true"></i></button>
                        </div>
                        <span aria-hidden="true">:</span>
                        <div class="stepper">
                            <button class="stepper-btn" onclick="changeValue('interval-sec', -1)" aria-label="Decrease Interval Seconds"><i class="fas fa-minus" aria-hidden="true"></i></button>
                            <input type="number" id="interval-sec" value="0" min="0" max="59" placeholder="S" aria-label="Interval Seconds">
                            <button class="stepper-btn" onclick="changeValue('interval-sec', 1)" aria-label="Increase Interval Seconds"><i class="fas fa-plus" aria-hidden="true"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="timer-display" id="interval-display" role="timer" aria-live="polite">10:00</div>
            <div id="next-interval" class="next-interval" aria-live="polite">Next beep in: 01:00</div>
            <div class="controls">
                <button id="interval-start" class="btn start" aria-label="Start Beep Timer"><i class="fas fa-play" aria-hidden="true"></i>Start</button>
                <button id="interval-stop" class="btn stop" disabled aria-label="Stop Beep Timer"><i class="fas fa-pause" aria-hidden="true"></i>Stop</button>
                <button id="interval-reset" class="btn reset" aria-label="Reset Beep Timer"><i class="fas fa-redo" aria-hidden="true"></i>Reset</button>
            </div>
        </div>

// UI Helpers
function announce(text) {
    const el = document.getElementById('aria-status');
    if (el) el.textContent = text;
}

// Screen Wake Lock API
let wakeLock = null;
const activeTimers = new Set();

async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => {
            wakeLock = null;
        });
    } catch (err) {
        console.error(`Wake Lock Error: ${err.name}, ${err.message}`);
    }
}

async function updateWakeLock() {
    if (activeTimers.size > 0) {
        if (!wakeLock) await requestWakeLock();
    } else {
        if (wakeLock) {
            await wakeLock.release();
            wakeLock = null;
        }
    }
}

document.addEventListener('visibilitychange', async () => {
    if (activeTimers.size > 0 && document.visibilityState === 'visible') {
        await updateWakeLock();
    }
});

function changeValue(id, delta) {
    const input = document.getElementById(id);
    if (!input) return;
    const min = input.min !== "" ? parseInt(input.min) : 0;
    const max = input.max !== "" ? parseInt(input.max) : 999;
    let val = parseInt(input.value) || 0;
    val = Math.max(min, Math.min(max, val + delta));
    input.value = val;
    input.dispatchEvent(new Event('input'));
}

// Tab Switching
function showTab(tab) {
    const sections = document.querySelectorAll('.section');
    const tabs = document.querySelectorAll('.tab-btn');
    const activeSection = document.getElementById(`${tab}-section`);
    const activeTab = document.getElementById(`tab-${tab}`);
    
    if (!activeSection || !activeTab) return;
    
    sections.forEach(s => s.classList.add('hidden'));
    tabs.forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
    });
    
    activeSection.classList.remove('hidden');
    activeTab.classList.add('active');
    activeTab.setAttribute('aria-selected', 'true');
    
    // Save current tab
    localStorage.setItem('lastTab', tab);
}

function playBeep(freq = 880, duration = 0.2, volOverride = null) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const userVol = parseFloat(document.getElementById('beep-volume').value);
    const vol = volOverride !== null ? volOverride : userVol;
    const type = document.getElementById('beep-type').value;

    // Enhanced Human-Like Synthesis
    if (type === 'bro' || type === 'babe' || type === 'coach' || type === 'morton') {
        const msg = new SpeechSynthesisUtterance();
        msg.volume = vol;
        const allVoices = window.speechSynthesis.getVoices();
        
        const genderedEnabled = document.getElementById('gendered-enabled').value === 'true';
        const userGender = document.getElementById('user-gender').value;
        const sentiment = document.getElementById('response-sentiment').value;
        
        let posPool, negPool;

        if (type === 'morton') {
            posPool = mortonPhrasesPos;
            negPool = mortonPhrasesNeg;
        } else if (genderedEnabled) {
            if (userGender === 'masculine') {
                posPool = broPhrasesPos;
                negPool = broPhrasesNeg;
            } else if (userGender === 'feminine') {
                posPool = babePhrasesPos;
                negPool = babePhrasesNeg;
            } else {
                posPool = coachPhrasesPos;
                negPool = coachPhrasesNeg;
            }
        } else {
            posPool = coachPhrasesPos;
            negPool = coachPhrasesNeg;
        }
        
        let pool;
        if (sentiment === 'positive') pool = posPool;
        else if (sentiment === 'negative') pool = negPool;
        else pool = [...posPool, ...negPool];
        
        msg.text = pool[Math.floor(Math.random() * pool.length)];

        if (type === 'babe') {
            msg.pitch = 1.2;
            msg.rate = 1.1; // Energetic
            const femaleVoice = allVoices.find(v => 
                (v.name.includes('Female') || v.name.includes('Google US English') || v.name.includes('Samantha')) 
                && v.lang.startsWith('en')
            );
            if (femaleVoice) msg.voice = femaleVoice;
        } else if (type === 'bro') {
            msg.pitch = 0.7; // Deeper, more "bro"
            msg.rate = 1.1; // More energetic
            const maleVoice = allVoices.find(v => 
                (v.name.includes('Male') || v.name.includes('Google UK English Male') || v.name.includes('Daniel')) 
                && v.lang.startsWith('en')
            );
            if (maleVoice) msg.voice = maleVoice;
        } else if (type === 'morton') {
            msg.pitch = 1.4; // Higher, more Morton-like
            msg.rate = 1.0; 
            const youngerVoice = allVoices.find(v => 
                (v.name.includes('Google US English') || v.name.includes('Samantha') || v.name.includes('Zira')) 
                && v.lang.startsWith('en')
            );
            if (youngerVoice) msg.voice = youngerVoice;
        } else {
            msg.pitch = 1.0;
            msg.rate = 1.0;
        }
        
        window.speechSynthesis.speak(msg);
        return;
    }

    // Cat Meow Synthesis (Improved)
    if (type === 'cat') {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        osc.connect(filter);
        filter.connect(g);
        g.connect(audioCtx.destination);
        
        osc.type = 'sawtooth'; // Richer harmonics for cat sound
        filter.type = 'lowpass';
        
        const now = audioCtx.currentTime;
        
        // Meow frequency sweep
        osc.frequency.setValueAtTime(450, now);
        osc.frequency.exponentialRampToValueAtTime(850, now + 0.1);
        osc.frequency.exponentialRampToValueAtTime(550, now + 0.5);
        
        // Filter sweep to make it "vowel-like" (m-e-o-w)
        filter.frequency.setValueAtTime(2000, now);
        filter.frequency.exponentialRampToValueAtTime(500, now + 0.5);
        
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(vol, now + 0.05);
        g.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        
        osc.start();
        osc.stop(now + 0.5);
        return;
    }

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (type === 'robot') oscillator.type = 'square';
    else if (type === 'retro') oscillator.type = 'sawtooth';
    else if (type === 'fun' || type === 'laser') oscillator.type = 'triangle';
    else oscillator.type = 'sine';

    if (type === 'laser') {
        oscillator.frequency.setValueAtTime(freq * 1.5, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + duration);
    } else if (type === 'fun') {
        oscillator.frequency.setValueAtTime(freq * 0.8, audioCtx.currentTime);
        oscillator.frequency.linearRampToValueAtTime(freq * 1.2, audioCtx.currentTime + duration * 0.5);
        oscillator.frequency.linearRampToValueAtTime(freq, audioCtx.currentTime + duration);
    } else {
        oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
    }

    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + duration);
}

    updateWorkoutDisplay();
    updateIntervalDisplay();

// Formatting Helpers
function formatHms(ms) {
    const hours = Math.floor(ms / 3600000);
    const minutes = Math.floor((ms % 3600000) / 60000);
    const seconds = Math.floor((ms % 60000) / 1000);
    return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
}

function formatMs(ms) {
    const minutes = Math.floor(ms / 60000);
    const seconds = Math.floor((ms % 60000) / 1000);
    return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
}

function formatStopwatch(ms) {
    const hours = Math.floor(ms / 3600000);
    const minutes = Math.floor((ms % 3600000) / 60000);
    const seconds = Math.floor((ms % 60000) / 1000);
    const centiseconds = Math.floor((ms % 1000) / 10);
    
    return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${centiseconds.toString().padStart(2, '0')}`;
}

// Countdown Logic
let countdownTimerId;
let countdownRemaining; // ms

const countdownDisplay = document.getElementById('countdown-display');
const countdownStartBtn = document.getElementById('countdown-start');
const countdownStopBtn = document.getElementById('countdown-stop');
const countdownResetBtn = document.getElementById('countdown-reset');

function updateCountdownDisplay() {
    if (countdownTimerId) return;
    const h = parseInt(document.getElementById('cd-hours').value) || 0;
    const m = parseInt(document.getElementById('cd-minutes').value) || 0;
    const s = parseInt(document.getElementById('cd-seconds').value) || 0;
    countdownRemaining = (h * 3600 + m * 60 + s) * 1000;
    countdownDisplay.textContent = formatHms(countdownRemaining);
    countdownDisplay.classList.remove('finished');
}

countdownStartBtn.addEventListener('click', () => {
    if (!countdownTimerId) {
        announce("Countdown started");
        if (countdownRemaining === undefined || countdownRemaining <= 0) updateCountdownDisplay();
        if (countdownRemaining <= 0) return;
        activeTimers.add('countdown');
        updateWakeLock();

        countdownTimerId = setInterval(() => {
            countdownRemaining -= 1000;
            if (countdownRemaining <= 0) {
                countdownRemaining = 0;
                activeTimers.delete('countdown');
                updateWakeLock();
                clearInterval(countdownTimerId);
                countdownTimerId = null;
                announce("Countdown finished!");
                playBeep(440, 0.5);
                setTimeout(() => playBeep(440, 0.5), 600);
                countdownDisplay.classList.add('finished');
                countdownStartBtn.disabled = false;
                countdownStopBtn.disabled = true;
            }
            countdownDisplay.textContent = formatHms(countdownRemaining);
        }, 1000);
    }
    countdownStartBtn.disabled = true;
    countdownStopBtn.disabled = false;
    document.querySelectorAll('#countdown-section input').forEach(i => i.disabled = true);
});

countdownStopBtn.addEventListener('click', () => {
    activeTimers.delete('countdown');
    updateWakeLock();
    clearInterval(countdownTimerId);
    countdownTimerId = null;
    countdownStartBtn.disabled = false;
    countdownStopBtn.disabled = true;
});

countdownResetBtn.addEventListener('click', () => {
    activeTimers.delete('countdown');
    updateWakeLock();
    clearInterval(countdownTimerId);
    countdownTimerId = null;
    updateCountdownDisplay();
    countdownStartBtn.disabled = false;
    countdownStopBtn.disabled = true;
    document.querySelectorAll('#countdown-section input').forEach(i => i.disabled = false);
});

workoutStartBtn.addEventListener('click', () => {
    if (!workoutTimerId) {
        announce("Workout timer started");
        if (workoutRound === undefined) {
            workoutRound = 1;
            workoutPhase = 'work';
            workoutTotalRounds = parseInt(document.getElementById('wk-rounds').value) || 1;
            const wm = parseInt(document.getElementById('wk-work-min').value) || 0;
            const ws = parseInt(document.getElementById('wk-work-sec').value) || 0;
            workoutRemainingMs = (wm * 60 + ws) * 1000;
        }
        activeTimers.add('workout');
        updateWakeLock();

        workoutTimerId = setInterval(() => {
            workoutRemainingMs -= 1000;
            
            if (workoutRemainingMs <= 0) {
                if (workoutPhase === 'work') {
                    playBeep(660, 0.3); // Break alert
                    workoutPhase = 'break';
                    const bm = parseInt(document.getElementById('wk-break-min').value) || 0;
                    const bs = parseInt(document.getElementById('wk-break-sec').value) || 0;
                    workoutRemainingMs = (bm * 60 + bs) * 1000;
                } else {
                    workoutRound++;
                    if (workoutRound > workoutTotalRounds) {
                        activeTimers.delete('workout');
                        updateWakeLock();
                        clearInterval(workoutTimerId);
                        workoutTimerId = null;
                        announce("Workout finished!");
                        workoutStatus.textContent = "Finished!";
                        workoutDisplay.classList.add('finished');
                        playBeep(880, 0.5);
                        setTimeout(() => playBeep(880, 0.5), 600);
                        workoutStartBtn.disabled = false;
                        workoutStopBtn.disabled = true;
                        return;
                    }
                    playBeep(880, 0.3); // Work alert
                    workoutPhase = 'work';
                    const wm = parseInt(document.getElementById('wk-work-min').value) || 0;
                    const ws = parseInt(document.getElementById('wk-work-sec').value) || 0;
                    workoutRemainingMs = (wm * 60 + ws) * 1000;
                }
            }
            
            workoutDisplay.textContent = formatMs(workoutRemainingMs);
            workoutStatus.textContent = workoutPhase.toUpperCase();
            workoutStatus.className = `status-label status-${workoutPhase}`;
            workoutRoundsDisplay.textContent = `Round ${workoutRound} of ${workoutTotalRounds}`;
        }, 1000);
    }
    workoutStartBtn.disabled = true;
    workoutStopBtn.disabled = false;
    document.querySelectorAll('#workout-section input').forEach(i => i.disabled = true);
});

        const intervalMin = parseInt(document.getElementById('interval-min').value) || 0;
        const intervalSec = parseInt(document.getElementById('interval-sec').value) || 0;
        intervalDuration = (intervalMin * 60 + intervalSec) * 1000;
        
        if (intervalTotalRemaining <= 0 || intervalDuration <= 0) return;
        if (currentIntervalRemaining === undefined) currentIntervalRemaining = intervalDuration;
        activeTimers.add('beep');
        updateWakeLock();

        intervalTimerId = setInterval(() => {
            intervalTotalRemaining -= 1000;
            currentIntervalRemaining -= 1000;

            if (intervalTotalRemaining <= 0) {
                activeTimers.delete('beep');
                updateWakeLock();
                clearInterval(intervalTimerId);
                intervalTimerId = null;
                announce("Beep timer finished!");
                intervalDisplay.textContent = "00:00";
                nextIntervalDisplay.textContent = "Finished!";
                nextIntervalDisplay.classList.add('finished');
                playBeep(880, 0.5);
                setTimeout(() => playBeep(880, 0.5), 300);
                intervalStartBtn.disabled = false;
                intervalStopBtn.disabled = true;
                return;
            }

            if (currentIntervalRemaining <= 0) {
                playBeep(880, 0.2);
                currentIntervalRemaining = Math.min(intervalDuration, intervalTotalRemaining);
            }

            intervalDisplay.textContent = formatMs(intervalTotalRemaining);
            nextIntervalDisplay.textContent = `Next beep in: ${formatMs(currentIntervalRemaining)}`;
        }, 1000);
    }
    intervalStartBtn.disabled = true;
    intervalStopBtn.disabled = false;
    document.querySelectorAll('#interval-section input').forEach(i => i.disabled = true);
});

intervalStopBtn.addEventListener('click', () => {
    activeTimers.delete('beep');
    updateWakeLock();
    clearInterval(intervalTimerId);
    intervalTimerId = null;
    intervalStartBtn.disabled = false;
    intervalStopBtn.disabled = true;
});

intervalResetBtn.addEventListener('click', () => {
    activeTimers.delete('beep');
    updateWakeLock();
    clearInterval(intervalTimerId);
    intervalTimerId = null;
    intervalTotalRemaining = undefined;
    currentIntervalRemaining = undefined;
    updateIntervalDisplay();
    intervalStartBtn.disabled = false;
    intervalStopBtn.disabled = true;
    document.querySelectorAll('#interval-section input').forEach(i => i.disabled = false);
});
    </script>
</body>
</html>
